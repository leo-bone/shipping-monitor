    <style>
        :root {
            --primary: #0066cc;
            --primary-light: #3385d6;
            --primary-dark: #004c99;
            --danger: #e53935;
            --danger-light: #ff6659;
            --warning: #ffa726;
            --warning-light: #ffb74d;
            --success: #43a047;
            --success-light: #76d275;
            --info: #29b6f6;
            
            --bg-primary: #0a0e14;
            --bg-secondary: #111920;
            --bg-card: #1a222c;
            --bg-hover: #242f3d;
            --bg-active: #2d3a4a;
            
            --border: #2a3544;
            --border-light: #3a4556;
            
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --text-muted: #6b7280;
            
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Background Pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 102, 204, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 180, 216, 0.06) 0%, transparent 50%),
                linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            pointer-events: none;
            z-index: -1;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #1e3a5f 100%);
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

        .header-content {

            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .header h1 span {
            background: linear-gradient(135deg, #00b4d8, #90e0ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: rgba(255,255,255,0.75);
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .header-status {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(0,0,0,0.3);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 10px var(--success);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.9); }
        }

        /* Controls */
        .controls {
            background: var(--bg-secondary);
            padding: 1.25rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .search-container {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 0.85rem 1.25rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.15);
        }

        .search-container input::placeholder {
            color: var(--text-muted);
        }

        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.65rem 1.15rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .filter-btn:hover {
            background: var(--bg-hover);
            border-color: var(--border-light);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 102, 204, 0.3);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 3rem;
            padding: 1.5rem 2rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .stat-item {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.2;
        }

        .stat-value.high { color: var(--danger); }
        .stat-value.warning { color: var(--warning); }
        .stat-value.success { color: var(--success); }
        .stat-value.primary { color: var(--primary-light); }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }

        /* Waterway Card */
        .waterway-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .waterway-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--success);
            transition: var(--transition);
        }

        .waterway-card.risk-high::before { 
            background: linear-gradient(180deg, var(--danger-light), var(--danger)); 
            box-shadow: 0 0 20px var(--danger);
        }
        .waterway-card.risk-medium::before { 
            background: linear-gradient(180deg, var(--warning-light), var(--warning)); 
        }
        .waterway-card.risk-low::before { 
            background: linear-gradient(180deg, var(--success-light), var(--success)); 
        }

        .waterway-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: var(--shadow-lg), 0 0 30px rgba(0, 102, 204, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .card-title-group {
            flex: 1;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.2rem;
        }

        .card-title-en {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .risk-badge {
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .risk-badge.high { 
            background: rgba(229, 57, 53, 0.15); 
            color: var(--danger-light);
            border: 1px solid rgba(229, 57, 53, 0.3);
        }
        .risk-badge.medium { 
            background: rgba(255, 167, 38, 0.15); 
            color: var(--warning);
            border: 1px solid rgba(255, 167, 38, 0.3);
        }
        .risk-badge.low { 
            background: rgba(67, 160, 71, 0.15); 
            color: var(--success-light);
            border: 1px solid rgba(67, 160, 71, 0.3);
        }

        .card-location {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .card-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .metric {
            background: var(--bg-primary);
            padding: 0.7rem;
            border-radius: var(--radius-sm);
            text-align: center;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .waterway-card:hover .metric {
            border-color: var(--border-light);
        }

        .metric-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .metric-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .metric-value.alert {
            color: var(--danger);
        }

        .card-footer {
            padding-top: 0.85rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-footer-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .card-footer-right {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .alert-indicator {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.6rem;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .alert-indicator.danger {
            background: rgba(229, 57, 53, 0.15);
            color: var(--danger-light);
        }

        .alert-indicator.success {
            background: rgba(67, 160, 71, 0.15);
            color: var(--success-light);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            padding: 2rem;
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 950px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 2rem;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            position: relative;
        }

        .modal-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at top right, rgba(0, 102, 204, 0.2), transparent 70%);
        }

        .modal-header-content {
            position: relative;
            z-index: 1;
        }

        .modal-header h2 {
            color: #fff;
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .modal-header .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .modal-header-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .meta-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(255,255,255,0.1);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.9);
        }

        .modal-close {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 2rem;
        }

        .detail-section {
            margin-bottom: 2rem;
        }

        .detail-section:last-child {
            margin-bottom: 0;
        }

        .detail-section h3 {
            font-size: 1rem;
            color: var(--primary-light);
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem;
        }

        .detail-card {
            background: var(--bg-primary);
            padding: 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        .detail-card .label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.35rem;
        }

        .detail-card .value {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .detail-card .value.alert {
            color: var(--danger);
        }

        /* Alerts */
        .alerts-list {
            list-style: none;
        }

        .alert-item {
            background: var(--bg-primary);
            border-left: 3px solid var(--danger);
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }

        .alert-item.warning {
            border-color: var(--warning);
        }

        .alert-item.success {
            border-color: var(--success);
            background: rgba(67, 160, 71, 0.08);
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }

        .alert-type {
            font-weight: 600;
            color: var(--danger-light);
            font-size: 0.9rem;
        }

        .alert-item.warning .alert-type {
            color: var(--warning);
        }

        .alert-severity {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            background: rgba(229, 57, 53, 0.15);
            color: var(--danger-light);
        }

        .alert-item.warning .alert-severity {
            background: rgba(255, 167, 38, 0.15);
            color: var(--warning);
        }

        .alert-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Map */
        #map {
            height: 350px;
            border-radius: var(--radius-md);
            margin-top: 0.5rem;
            border: 1px solid var(--border);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .loading-subtext {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .no-results-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;

            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
            background: var(--bg-secondary);
        }

        .footer a {

        .footer a:hover {

        }

        /* Responsive */
        @media (max-width: 768px) {

            .search-container { width: 100%; }
            .filters { width: 100%; justify-content: center; }
            .stats-bar { gap: 1.5rem; padding: 1rem; flex-wrap: wrap; }
            .stat-value { font-size: 1.4rem; }
            .container { padding: 1rem; }
            .cards-grid { grid-template-columns: 1fr; }
            .modal { max-width: 100%; margin: 0; border-radius: var(--radius-lg) var(--radius-lg) 0 0; max-height: 95vh; }
            .modal-overlay { padding: 0; align-items: flex-end; }
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Focus styles */
        .waterway-card:focus,
        .filter-btn:focus,
        .modal-close:focus {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-status">
                <span class="status-dot"></span>
                <span>系统正常运行 · 每10分钟自动更新</span>
            </div>
            <h1>🌊 <span>全球关键水道</span>通航监测平台</h1>
            <p>实时监控全球最重要的10条海上通道 · 安全预警 · 天气海况 · 通航状态</p>
        </div>
    </header>

    <!-- Controls -->
    <div class="controls">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="搜索水道名称、国家或地区..." aria-label="搜索水道">
        </div>
        <div class="filters" role="group" aria-label="筛选选项">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="high">高风险</button>
            <button class="filter-btn" data-filter="medium">中风险</button>
            <button class="filter-btn" data-filter="low">低风险</button>
            <button class="filter-btn" data-filter="alert">有预警</button>
        </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar" role="status" aria-live="polite">
        <div class="stat-item">
            <div class="stat-value primary" id="totalCount">-</div>
            <div class="stat-label">水道总数</div>
        </div>
        <div class="stat-item">
            <div class="stat-value danger" id="alertCount">-</div>
            <div class="stat-label">活跃预警</div>
        </div>
        <div class="stat-item">
            <div class="stat-value success" id="safeCount">-</div>
            <div class="stat-label">正常通航</div>
        </div>
        <div class="stat-item">
            <div class="stat-value warning" id="lastUpdate">-</div>
            <div class="stat-label">最后更新</div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container">
        <div class="cards-grid" id="cardsGrid" role="region" aria-label="水道列表">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div class="loading-text">正在加载水道数据...</div>
                <div class="loading-subtext">数据来源：全球水道监测平台</div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>数据仅供参考，不构成航行建议 · 更新时间：<span id="footerUpdate">-</span></p>
        <p>© 2026 全球水道监测平台 · <a href="#">使用条款</a> · <a href="#">隐私政策</a></p>
    </footer>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal">
            <div class="modal-header">
                <button class="modal-close" onclick="closeModal()" aria-label="关闭弹窗">×</button>
                <div class="modal-header-content">
                    <h2 id="modalTitle">水道名称</h2>
                    <p class="subtitle" id="modalSubtitle">英文名 · 位置</p>
                    <div class="modal-header-meta" id="modalMeta"></div>
                </div>
            </div>
            <div class="modal-body">
                <!-- Location & Map -->
                <div class="detail-section">
                    <h3>🗺️ 位置与地图</h3>
                    <div id="map"></div>
                </div>

                <!-- Basic Info -->
                <div class="detail-section">
                    <h3>📋 基础信息</h3>
                    <div class="detail-grid" id="basicGrid"></div>
                </div>

                <!-- Weather -->
                <div class="detail-section">
                    <h3>🌤️ 天气海况</h3>
                    <div class="detail-grid" id="weatherGrid"></div>
                </div>

                <!-- Traffic -->
                <div class="detail-section">
                    <h3>🚢 通航状态</h3>
                    <div class="detail-grid" id="trafficGrid"></div>
                </div>

                <!-- Security -->
                <div class="detail-section">
                    <h3>⚠️ 安全预警</h3>
                    <div id="securityAlerts"></div>
                </div>

                <!-- Importance -->
                <div class="detail-section">
                    <h3>💡 战略重要性</h3>
                    <p id="importanceText" style="color: var(--text-primary); line-height: 1.7;"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Global State
        let allData = null;
        let map = null;
        let mapMarkers = {};

        // Load Data
        async function loadData() {
            try {
                const response = await fetch('data/full_data.json');
                if (!response.ok) throw new Error('数据加载失败');
                allData = await response.json();
                renderCards(allData);
                updateStats(allData);
                console.log('✓ 数据已更新:', allData.last_updated);
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('cardsGrid').innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">⚠️</div>
                        <p>数据加载失败</p>
                        <p style="font-size: 0.85rem; margin-top: 0.5rem;">请检查网络连接后刷新页面</p>
                    </div>
                `;
            }
        }

        // Render Cards
        function renderCards(data) {
            const grid = document.getElementById('cardsGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;

            let filtered = data.waterways.filter(w => {
                // Search filter
                const matchSearch = !searchTerm || 
                    w.name.toLowerCase().includes(searchTerm) || 
                    w.name_en.toLowerCase().includes(searchTerm) ||
                    w.id.toLowerCase().includes(searchTerm) ||
                    w.location.toLowerCase().includes(searchTerm) ||
                    (w.country && w.country.some(c => c.toLowerCase().includes(searchTerm)));

                // Risk filter
                let matchFilter = true;
                if (activeFilter === 'high') matchFilter = w.risk_level === '高';
                else if (activeFilter === 'medium') matchFilter = w.risk_level === '中';
                else if (activeFilter === 'low') matchFilter = w.risk_level === '低';
                else if (activeFilter === 'alert') {
                    const security = data.security[w.id];
                    matchFilter = security && security.alerts && security.alerts.length > 0;
                }

                return matchSearch && matchFilter;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <p>没有找到匹配的水道</p>
                        <p style="font-size: 0.85rem; margin-top: 0.5rem;">试试其他搜索词或筛选条件</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(w => {
                const weather = data.weather[w.id] || {};
                const traffic = data.traffic[w.id] || {};
                const security = data.security[w.id] || {};

                const riskClass = w.risk_level === '高' ? 'risk-high' : 
                                  w.risk_level === '中' ? 'risk-medium' : 'risk-low';
                const riskBadge = w.risk_level === '高' ? 'high' : 
                                 w.risk_level === '中' ? 'medium' : 'low';

                const hasAlerts = security.alerts && security.alerts.length > 0;

                return `
                    <article class="waterway-card ${riskClass}" onclick="openModal('${w.id}')" tabindex="0" role="button" aria-label="${w.name} - ${w.risk_level}风险">
                        <div class="card-header">
                            <div class="card-title-group">
                                <div class="card-title">${w.name}</div>
                                <div class="card-title-en">${w.name_en}</div>
                            </div>
                            <span class="risk-badge ${riskBadge}">${w.risk_level}</span>
                        </div>
                        <div class="card-location">📍 ${w.location}</div>
                        <div class="card-metrics">
                            <div class="metric">
                                <div class="metric-label">天气</div>
                                <div class="metric-value">${weather.condition || '-'}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">等待船只</div>
                                <div class="metric-value ${traffic.waiting_ships > 15 ? 'alert' : ''}">${traffic.waiting_ships || 0}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">日通航</div>
                                <div class="metric-value">${traffic.daily_transit || 0}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">状态</div>
                                <div class="metric-value">${traffic.queue_status || '-'}</div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <div class="card-footer-left">
                                <span>🌡️ ${weather.temperature || '-'}</span>
                            </div>
                            <span class="alert-indicator ${hasAlerts ? 'danger' : 'success'}">
                                ${hasAlerts ? '⚠️ ' + security.alerts.length + '条预警' : '✓ 正常'}
                            </span>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // Update Stats
        function updateStats(data) {
            const total = data.waterways.length;
            let alerts = 0;
            let safe = 0;

            data.waterways.forEach(w => {
                const security = data.security[w.id];
                if (security && security.alerts && security.alerts.length > 0) {
                    alerts += security.alerts.length;
                } else {
                    safe++;
                }
            });

            document.getElementById('totalCount').textContent = total;
            document.getElementById('alertCount').textContent = alerts;
            document.getElementById('safeCount').textContent = safe;

            // 使用北京时间显示
            const updateTime = new Date(data.last_updated);
            document.getElementById('lastUpdate').textContent = 
                updateTime.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Shanghai' });
            document.getElementById('footerUpdate').textContent = 
                updateTime.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        // Open Modal
        function openModal(id) {
            const waterway = allData.waterways.find(w => w.id === id);
            if (!waterway) return;

            const weather = allData.weather[id] || {};
            const traffic = allData.traffic[id] || {};
            const security = allData.security[id] || {};

            // Header
            document.getElementById('modalTitle').textContent = waterway.name;
            document.getElementById('modalSubtitle').textContent = `${waterway.name_en} · ${waterway.location}`;
            
            document.getElementById('modalMeta').innerHTML = `
                <span class="meta-tag">📍 ${waterway.location}</span>
                <span class="meta-tag">🏛️ ${waterway.country ? waterway.country.join(', ') : '-'}</span>
                <span class="meta-tag">${waterway.risk_level === '高' ? '🔴' : (waterway.risk_level === '中' ? '🟡' : '🟢')} ${waterway.risk_level}风险</span>
            `;

            // Basic Info
            document.getElementById('basicGrid').innerHTML = `
                <div class="detail-card">
                    <div class="label">深度</div>
                    <div class="value">${waterway.depth || '-'}</div>
                </div>
                <div class="detail-card">
                    <div class="label">宽度</div>
                    <div class="value">${waterway.width || '-'}</div>
                </div>
                <div class="detail-card">
                    <div class="label">年通航量</div>
                    <div class="value">${waterway.annual_traffic || '-'}</div>
                </div>
                <div class="detail-card">
                    <div class="label">坐标</div>
                    <div class="value">${waterway.coordinates[1]}°, ${waterway.coordinates[0]}°</div>
                </div>
            `;

            // Weather
            document.getElementById('weatherGrid').innerHTML = `
                <div class="detail-card">
                    <div class="label">气温</div>
                    <div class="value">${weather.temperature || '-'}</div>
                </div>
                <div class="detail-card">
                    <div class="label">风速</div>
                    <div class="value">${weather.wind || '-'}</div>
                </div>
                <div class="detail-card">
                    <div class="label">海浪</div>
                    <div class="value">${weather.wave || '-'}</div>
                </div>
                <div class="detail-card">
                    <div class="label">能见度</div>
                    <div class="value">${weather.visibility || '-'}</div>
                </div>
                <div class="detail-card">
                    <div class="label">湿度</div>
                    <div class="value">${weather.humidity || '-'}</div>
                </div>
                <div class="detail-card">
                    <div class="label">天气</div>
                    <div class="value">${weather.condition_icon || ''} ${weather.condition || '-'}</div>
                </div>
            `;

            // Traffic
            document.getElementById('trafficGrid').innerHTML = `
                <div class="detail-card">
                    <div class="label">等待船只</div>
                    <div class="value ${traffic.waiting_ships > 15 ? 'alert' : ''}">${traffic.waiting_ships || 0} 艘</div>
                </div>
                <div class="detail-card">
                    <div class="label">日通航量</div>
                    <div class="value">${traffic.daily_transit || 0} 艘</div>
                </div>
                <div class="detail-card">
                    <div class="label">平均等待</div>
                    <div class="value">${traffic.avg_wait_time || '-'}</div>
                </div>
                <div class="detail-card">
                    <div class="label">排队状态</div>
                    <div class="value">${traffic.queue_icon || ''} ${traffic.queue_status || '-'}</div>
                </div>
            `;

            // Security Alerts
            const alertsHtml = security.alerts && security.alerts.length > 0 
                ? `<ul class="alerts-list">
                    ${security.alerts.map(a => `
                        <li class="alert-item ${a.severity === '低' ? 'warning' : ''}">
                            <div class="alert-header">
                                <span class="alert-type">${a.type}</span>
                                <span class="alert-severity">${a.severity}</span>
                            </div>
                            <div class="alert-meta">📍 ${a.location} · 🕐 ${a.time}</div>
                        </li>
                    `).join('')}
                   </ul>`
                : `<ul class="alerts-list">
                    <li class="alert-item success">
                        <div class="alert-header">
                            <span class="alert-type">✅ 无预警</span>
                        </div>
                        <div class="alert-meta">当前水域安全，适宜通行</div>
                    </li>
                   </ul>`;
            document.getElementById('securityAlerts').innerHTML = alertsHtml;

            // Importance
            document.getElementById('importanceText').innerHTML = `
                <strong>${waterway.name}</strong>（${waterway.name_en}）是全球重要的海上通道之一。<br>
                ${waterway.importance}<br><br>
                风险因素：${waterway.risk_factors ? waterway.risk_factors.join('、') : '暂无'}
            `;

            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';

            // Initialize Map
            setTimeout(() => initMap(waterway), 100);
        }

        // Initialize Map
        function initMap(waterway) {
            if (map) {
                map.remove();
            }

            map = L.map('map', {
                center: waterway.coordinates,
                zoom: 5,
                scrollWheelZoom: false
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap © CARTO',
                maxZoom: 19
            }).addTo(map);

            // Custom marker
            const markerIcon = L.divIcon({
                className: 'custom-marker',
                html: `<div style="
                    width: 30px;
                    height: 30px;
                    background: linear-gradient(135deg, #0066cc, #00b4d8);
                    border-radius: 50%;
                    border: 3px solid #fff;
                    box-shadow: 0 4px 15px rgba(0,102,204,0.5);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 14px;
                ">🌊</div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            L.marker(waterway.coordinates, { icon: markerIcon })
                .addTo(map)
                .bindPopup(`
                    <div style="font-family: 'Noto Sans SC', sans-serif; padding: 5px;">
                        <strong>${waterway.name}</strong><br>
                        <span style="color: #666;">${waterway.name_en}</span>
                    </div>
                `)
                .openPopup();
        }

        // Close Modal
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Search Function
        function searchWaterways() {
            if (!allData) return;
            renderCards(allData);
        }

        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', () => {
            renderCards(allData);
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCards(allData);
            });
        });

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Keyboard navigation for cards
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.classList.contains('waterway-card')) {
                e.target.click();
            }
        });

        // Auto refresh every 10 minutes
        setInterval(loadData, 600000);

        // Initial load
        loadData();
    </script>
</body>
</html>
