name: 更新水道数据

on:
  # 手动触发
  workflow_dispatch:
  # 代码推送时运行
  push:
    branches:
      - main
  # 定时运行：每10分钟
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 安装依赖
        run: |
          pip install requests
        
      - name: 运行数据抓取脚本
        run: |
          python scripts/update_data.py
          
      - name: 提交数据更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自动更新水道数据 $(date '+%Y-%m-%d %H:%M')"
          file_pattern: |
            data/*.json
            public/data/*.json

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: |
            public
            CNAME
          sparse-checkout-cone-mode: false
          
      - name: 复制 CNAME 到 public 目录
        run: |
          if [ -f CNAME ]; then
            cp CNAME public/
          fi
          
      - name: 设置 Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
